<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Orbiter Daily Digest</title>
  <style>
    body {
      background-color: #0f172a;
      color: #f8fafc;
      font-family: 'Inter', -apple-system, sans-serif;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background-color: #1e293b;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 30px;
    }
    .header {
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 20px;
      margin-bottom: 20px;
      text-align: center;
    }
    .header h1 {
      margin: 0;
      color: #3b82f6;
      font-size: 24px;
    }
    .date {
      color: #94a3b8;
      font-size: 14px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-bottom: 30px;
    }
    .stat-card {
      background-color: rgba(30, 41, 59, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 15px;
      text-align: center;
    }
    .stat-value {
      font-size: 24px;
      font-weight: bold;
      color: #10b981;
    }
    .stat-label {
      color: #94a3b8;
      font-size: 12px;
      margin-top: 5px;
    }
    .job-list {
      margin-bottom: 30px;
    }
    .job-card {
      background-color: rgba(15, 23, 42, 0.5);
      border-left: 4px solid #3b82f6;
      border-radius: 6px;
      padding: 15px;
      margin-bottom: 15px;
    }
    .job-title {
      font-weight: bold;
      font-size: 16px;
    }
    .job-company {
      color: #94a3b8;
      font-size: 14px;
      margin-top: 2px;
    }
    .job-match {
      display: inline-block;
      margin-top: 10px;
      background: rgba(16, 185, 129, 0.2);
      color: #10b981;
      font-size: 12px;
      font-weight: bold;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .footer {
      text-align: center;
      color: #94a3b8;
      font-size: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: 20px;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🛰️ Orbiter Mission Control</h1>
      <div class="date">{{ date }}</div>
    </div>
    
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value">{{ matches_count }}</div>
        <div class="stat-label">New Matches</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">{{ applied_count }}</div>
        <div class="stat-label">Auto-Applied</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color: #f59e0b;">{{ review_count }}</div>
        <div class="stat-label">Review Needed</div>
      </div>
    </div>
    
    <div class="job-list">
      <h3>Matched Opportunities</h3>
      {{ job_cards_html }}
    </div>
    
    <div class="footer">
      This is an automated report from your Orbiter platform.<br>
      Access your <a href="{{ dashboard_url }}" style="color: #3b82f6; text-decoration: none;">Mission Control Dashboard</a>.
    </div>
  </div>
</body>
</html>
